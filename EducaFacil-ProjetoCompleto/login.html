<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Login</title><link rel='stylesheet' href='style.css'></head><body><div class='container'><h2>Login</h2><input id='email' placeholder='E-mail'><input id='senha' type='password' placeholder='Senha'><button onclick='entrar()'>Entrar</button><p id='msg'></p></div><script>function entrar(){const u=JSON.parse(localStorage.getItem('usuario'));if(u&&email.value===u.email&&senha.value===u.senha){window.location='dashboard.html';}else{msg.innerText='Usuário não encontrado. Faça um cadastro primeiro.';}}</script></body></html>
