<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Cadastro</title><link rel='stylesheet' href='style.css'></head><body><div class='container'><h2>Cadastro</h2><input id='nome' placeholder='Nome'><input id='email' placeholder='E-mail'><input id='senha' type='password' placeholder='Senha'><button onclick='cadastrar()'>Cadastrar</button><p id='msg'></p><a href='login.html'>Já tenho conta</a></div><script>function cadastrar(){const u={nome:nome.value,email:email.value,senha:senha.value};localStorage.setItem('usuario',JSON.stringify(u));msg.innerText='Cadastro realizado com sucesso!';}</script></body></html>
